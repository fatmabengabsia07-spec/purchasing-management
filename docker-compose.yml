version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: purchasing-db
    environment:
      MYSQL_DATABASE: purchasing_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appuser123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./purchasing-management
    container_name: purchasing-backend
    ports:
      - "9090:9090"
    environment:
      - SERVER_PORT=9090
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/purchasing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=appuser123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./ProjetJEE/purchasing-frontend
    container_name: purchasing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: